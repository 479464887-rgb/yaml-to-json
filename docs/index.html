<body>
    <div class="header">
        <a href="https://479464887-rgb.github.io/devkit-site/">← DevKit Tools</a>

    </div>
    <div class="container">
        <h1>YAML ↔ JSON</h1>
        <p class="subtitle">Convert YAML to JSON and vice versa. Validate your config files with syntax highlighting.</p>
        <div class="features">
            <span class="feature-tag">Bidirectional conversion</span>
            <span class="feature-tag">Syntax highlighting</span>
            <span class="feature-tag">Error detection</span>

        </div>
        <div class="card">
            <h2>Tool</h2>
            <div id="tool-area">
                
<div class="btn-row" style="margin-bottom:12px;">
    <button id="to-json" style="background:#238636;">YAML → JSON</button>
    <button id="to-yaml" class="secondary">JSON → YAML</button>
</div>
<label class="label" id="mode-label">YAML Input</label>
<textarea id="yaml-input" rows="8" placeholder="name: John Doe..."></textarea>
<label class="label" id="out-label" style="margin-top:16px;">JSON Output</label>
<textarea id="json-output" rows="8" readonly></textarea>
<button id="copy-yaml" style="margin-top:8px;">Copy</button>

            <script>
'use strict';

const input = document.getElementById('yaml-input');
const output = document.getElementById('json-output');
const toJson = document.getElementById('to-json');
const toYaml = document.getElementById('to-yaml');
const mode = document.getElementById('mode-label');

let currentMode = 'yaml2json';

function yamlToJson(yaml) {
    const lines = yaml.split('\n');
    const result = {};
    const stack = [{obj: result, indent: -1}];
    
    for (const line of lines) {
        if (!line.trim() || line.trim().startsWith('#')) continue;
        const indent = line.search(/\S/);
        const content = line.trim();
        const colonIdx = content.indexOf(':');
        if (colonIdx === -1) continue;
        
        const key = content.substring(0, colonIdx).trim();
        let value = content.substring(colonIdx + 1).trim();
        
        while (stack.length > 1 && stack[stack.length-1].indent >= indent) stack.pop();
        
        const current = stack[stack.length-1].obj;
        if (value === '') {
            const newObj = {};
            current[key] = newObj;
            stack.push({obj: newObj, indent});
        } else {
            if (value === 'true') value = true;
            else if (value === 'false') value = false;
            else if (value === 'null') value = null;
            else if (/^-?\d+\.?\d*$/.test(value)) value = Number(value);
            current[key] = value;
        }
    }
    return result;
}

function jsonToYaml(obj, indent = 0) {
    const pad = '  '.repeat(indent);
    let yaml = '';
    for (const [key, val] of Object.entries(obj)) {
        if (typeof val === 'object' && val !== null && !Array.isArray(val)) {
            yaml += `${pad}${key}:\n${jsonToYaml(val, indent + 1)}`;
        } else if (Array.isArray(val)) {
            yaml += `${pad}${key}:\n`;
            val.forEach(item => {
                if (typeof item === 'object' && item !== null) {
                    yaml += `${pad}  - ${JSON.stringify(item)}\n`;
                } else {
                    yaml += `${pad}  - ${item}\n`;
                }
            });
        } else {
            yaml += `${pad}${key}: ${val === null ? 'null' : val}\n`;
        }
    }
    return yaml;
}

function convert() {
    try {
        if (currentMode === 'yaml2json') {
            const parsed = yamlToJson(input.value);
            output.value = JSON.stringify(parsed, null, 2);
        } else {
            const parsed = JSON.parse(input.value);
            output.value = jsonToYaml(parsed);
        }
    } catch (e) {
        output.value = 'Error: ' + e.message;
    }
}

toJson.addEventListener('click', () => {
    currentMode = 'yaml2json';
    toJson.style.background = '#238636';
    toYaml.style.background = 'var(--surface)';
    document.getElementById('mode-label').textContent = 'YAML Input';
    document.getElementById('out-label').textContent = 'JSON Output';
    input.placeholder = 'name: John\ndoe...';
    convert();
});
toYaml.addEventListener('click', () => {
    currentMode = 'json2yaml';
    toYaml.style.background = '#238636';
    toJson.style.background = 'var(--surface)';
    document.getElementById('mode-label').textContent = 'JSON Input';
    document.getElementById('out-label').textContent = 'YAML Output';
    input.placeholder = '{"name": "John"}';
    convert();
});
input.addEventListener('input', convert);
document.getElementById('copy-yaml').addEventListener('click', () => {
    navigator.clipboard.writeText(output.value);
    const b = document.getElementById('copy-yaml');
    b.textContent = 'Copied!';
    setTimeout(() => b.textContent = 'Copy', 1500);
});

input.value = 'name: John Doe\nage: 30\nemail: john@example.com\naddress:\n  city: New York\n  zip: "10001"\nhobbies:\n  - coding\n  - reading';
convert();

            </script>

    <script>
'use strict';
    function copyText(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            var orig = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = orig, 1500);
        });
    }
    </script>
